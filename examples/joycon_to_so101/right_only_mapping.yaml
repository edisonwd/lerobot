# Joy-Con → SO-101 舵机映射配置 (仅右遥控器)
#
# 用于 macOS 蓝牙下左 Joy-Con 无法切换到完整模式的情况。
# 仅使用右 Joy-Con (full mode) 的摇杆、按键和 IMU。
#
# 用法:
#   uv run python examples/joycon_to_so101/teleoperate.py \
#       --port=/dev/tty.usbmodem* \
#       --mode=single_right \
#       --mapping=examples/joycon_to_so101/right_only_mapping.yaml

mappings:
  # Motor 1: Shoulder Pan (右摇杆 X)
  - input: right_stick_x
    motor: shoulder_pan
    control: incremental
    speed: 1.5
    invert: false

  # Motor 2: Shoulder Lift (右摇杆 Y)
  - input: right_stick_y
    motor: shoulder_lift
    control: incremental
    speed: 1.5
    invert: true

  # Motor 3: Elbow Flex (R=上, ZR=下)
  - input: r
    motor: elbow_flex
    control: incremental
    speed: 1.5
    invert: false

  - input: zr
    motor: elbow_flex
    control: incremental
    speed: 1.5
    invert: true

  # Motor 4: Wrist Flex (IMU 前后倾斜)
  - input: imu_tilt
    motor: wrist_flex
    control: absolute
    scale: 0.5

  # Motor 5: Wrist Roll (IMU 左右翻滚)
  - input: imu_roll
    motor: wrist_roll
    control: absolute
    scale: 0.5

  # Motor 6: Gripper (A=关, B=开)
  - input: a
    motor: gripper
    control: incremental
    speed: 3.0
    invert: false

  - input: b
    motor: gripper
    control: incremental
    speed: 3.0
    invert: true

meta_controls:
  speed_up: y              # Y 键加速
  speed_down: x            # X 键减速
  fine_tune_toggle: r_stick_press  # 右摇杆按下切换微调
