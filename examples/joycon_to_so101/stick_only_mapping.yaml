# SO101 Joy-Con 传统摇杆映射
# 纯摇杆控制，无陀螺仪，适合调试和机械限位检查

mappings:
  # 轴 1: 底座 — 左摇杆 X
  - input: left_stick_x
    motor: shoulder_pan
    control: incremental
    speed: 1.5

  # 轴 2: 大臂 — 左摇杆 Y
  - input: left_stick_y
    motor: shoulder_lift
    control: incremental
    speed: 1.5
    invert: false

  # 轴 3: 肘部 — 右摇杆 Y
  - input: right_stick_y
    motor: elbow_flex
    control: incremental
    speed: 1.5
    invert: true

  # 轴 4: 腕俯仰 — 右摇杆 X
  - input: right_stick_x
    motor: wrist_flex
    control: incremental
    speed: 1.15

  # 轴 5: 腕自转 — ZL / ZR
  - input: a
    motor: wrist_roll
    control: incremental
    speed: 1.15
    invert: true

  - input: b
    motor: wrist_roll
    control: incremental
    speed: 1.15

  # 轴 6: 夹爪 — L / R
  - input: zr
    motor: gripper
    control: incremental
    speed: 3.0

  - input: r
    motor: gripper
    control: incremental
    speed: 3.0
    invert: true

meta_controls:
  speed_up: dpad_up
  reset_to_center: dpad_down
  recalibrate_imu: dpad_left
  pose_lock: dpad_right
  mode_switch: sl_right
  filter_toggle: sr_right
  fine_tune_toggle: l_stick_press

presets:
  pickup:
    shoulder_lift: -30.0
    elbow_flex: 45.0
    wrist_flex: -20.0
  place:
    shoulder_lift: 30.0
    elbow_flex: -20.0
    wrist_flex: 10.0
